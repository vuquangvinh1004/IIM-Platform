name: Python CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: windows-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.13"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install -r requirements-dev.txt

      - name: Run core and shell tests
        run: |
          python -m pytest tests/unit tests/integration tests/ui/test_smoke_shell.py

      - name: Run representative module tests
        run: |
          python -m pytest \
            modules/statistics/normal_distribution/tests/test_smoke_ui.py \
            modules/statistics/exponential_distribution/tests/test_smoke_ui.py \
            modules/statistics/time_series/tests/test_manifest.py \
            modules/economics/supply_demand/tests/test_manifest_and_logic.py
