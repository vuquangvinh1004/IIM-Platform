name: Python CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  core-and-shell:
    runs-on: windows-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.13"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install -r requirements-dev.txt

      - name: Run core and shell tests
        working-directory: ${{ github.workspace }}
        run: |
          python -m pytest --rootdir=. tests/unit tests/integration tests/ui/test_smoke_shell.py

  module-slice:
    runs-on: windows-latest
    needs: core-and-shell

    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install -r requirements-dev.txt

      - name: Run representative module tests
        working-directory: ${{ github.workspace }}
        run: |
          python -m pytest --rootdir=. modules/statistics/normal_distribution/tests/test_smoke_ui.py modules/statistics/exponential_distribution/tests/test_smoke_ui.py modules/statistics/time_series/tests/test_manifest.py modules/economics/supply_demand/tests/test_manifest_and_logic.py
